<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bill Tracker</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>

<body>
  <div id="app">

    <!-- Add Bill Form -->
    <div id="form-container">
      <form id="bill-form">
        <h2>Add Bill</h2>

        <label>Bill Name</label>
        <input type="text" name="name" required />

        <label>Amount</label>
        <input type="number" name="amount" step="0.01" required />

        <label>Due Date</label>
        <input type="date" name="due" required />

        <label>Recurring</label>
        <input type="text" name="recurring" placeholder="Monthly, Weekly, etc." />

        <label>Payment Link</label>
        <input type="text" name="link" placeholder="example.com/pay" />

        <div class="form-buttons">
          <button type="submit" class="primary-btn">Add Bill</button>
          <button type="button" id="cancel-add" class="secondary-btn">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Table View -->
    <table id="bill-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Amount</th>
          <th>Due</th>
          <th>Recurring</th>
          <th>Link</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="bill-table-body"></tbody>
    </table>

    <!-- Card View -->
    <div class="cards-container">
      <div id="bill-cards"></div>
    </div>

    <!-- Floating Add Button -->
    <button id="add-btn" class="fab">+</button>

  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
