<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Tracker</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="styles.css?v=2">
</head>

<body>

  <header>
    <h1>Bill Tracker</h1>
    <button id="theme-toggle">🌙</button>
  </header>

  <div id="form-container">
    <form id="bill-form">
      <input id="bill-name" type="text" placeholder="Bill name" required>
      <input id="bill-amount" type="number" step="0.01" inputmode="decimal" placeholder="Amount" required>
      <input id="bill-due" type="date" placeholder="Due date" required>

      <select id="bill-recurring">
        <option value="" disabled selected hidden>Recurring</option>
        <option value="none">One-time</option>
        <option value="monthly">Monthly</option>
        <option value="quarterly">Quarterly</option>
        <option value="yearly">Yearly</option>
      </select>

      <input id="bill-link" type="text" placeholder="Payment link">
      <button type="submit">Add Bill</button>
      <button type="button" id="cancel-add">Cancel</button>

    </form>
  </div>

  <table id="bill-table">
    <thead>
      <tr>
        <th>Bill</th>
        <th>Amount</th>
        <th>Due</th>
        <th>Recurring</th>
        <th>Link</th>
        <th>Paid</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="cards-container">
    <div id="bill-cards"></div>
  </div>

  <button id="fab-add" class="fab">+</button>

  <script src="app.js?v=2"></script>

  <div id="update-toast" class="update-toast hidden">
    <div class="toast-message">A new version is available</div>
    <button id="update-toast-btn">Update</button>
  </div>

</body>

</html>
