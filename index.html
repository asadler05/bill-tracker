<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bill Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <header>
    <h1>Bill Tracker</h1>
    <button id="theme-toggle">🌙</button>
  </header>

  <!-- HIDDEN FORM CONTAINER -->
  <div id="form-container">
    <form id="bill-form">
      <input type="text" id="bill-name" placeholder="Bill name" required>
      <input type="number" id="bill-amount" placeholder="Amount" required>
      <input type="date" id="bill-due" required>

      <select id="bill-recurring">
        <option value="none">One-time</option>
        <option value="monthly">Monthly</option>
        <option value="quarterly">Quarterly</option>
        <option value="yearly">Yearly</option>
      </select>

      <input type="url" id="bill-link" placeholder="Payment URL">

      <button type="submit" class="primary-btn">Add Bill</button>
    </form>
  </div>

  <!-- DESKTOP TABLE -->
  <table>
    <thead>
      <tr>
        <th>Bill</th>
        <th>Amount</th>
        <th>Due</th>
        <th>Recurring</th>
        <th>Pay</th>
        <th>Paid</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="bill-table"></tbody>
  </table>

  <!-- MOBILE CARDS -->
  <div id="bill-cards" class="cards-container"></div>

  <!-- FLOATING ACTION BUTTON -->
  <button id="fab-add">＋</button>

  <script src="app.js"></script>
</body>
</html>
